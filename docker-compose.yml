# TrustGuard RAG 平台全栈。宿主机端口统一用 182xx 段，便于与 trustguard-agent 并行运行。
# 启动：docker compose up -d --build   健康检查：curl http://localhost:18200/health
name: trustguard-rag

x-optional-env-files: &optional-env-files
  - path: .env
    required: false

x-build-args: &build-args
  DOCKERHUB_REGISTRY: ${DOCKERHUB_REGISTRY:-docker.io}
  TRUSTGUARD_NETWORK_PROXY: ${TRUSTGUARD_NETWORK_PROXY:-}
  PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
  PIP_EXTRA_INDEX_URL: ${PIP_EXTRA_INDEX_URL:-}

x-build-extra-hosts: &build-extra-hosts
  - "host.docker.internal:host-gateway"

services:
  mineru-api:
    build:
      context: .
      dockerfile: Dockerfile.mineru
      args:
        MINERU_BASE_IMAGE: ${MINERU_BASE_IMAGE:-vllm/vllm-openai:v0.21.0}
        MINERU_PACKAGE_SPEC: ${MINERU_PACKAGE_SPEC:-mineru[core]>=3.4.0}
        MINERU_MODEL_SOURCE: ${MINERU_MODEL_SOURCE:-modelscope}
        UBUNTU_APT_MIRROR: ${UBUNTU_APT_MIRROR:-https://mirrors.tuna.tsinghua.edu.cn/ubuntu}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        PIP_EXTRA_INDEX_URL: ${PIP_EXTRA_INDEX_URL:-}
      extra_hosts: *build-extra-hosts
      network: host
    image: ${MINERU_IMAGE:-trustguard-mineru:latest}
    ports:
      - "18220:8000"
    environment:
      MINERU_MODEL_SOURCE: local
      MINERU_API_MAX_CONCURRENT_REQUESTS: ${MINERU_API_MAX_CONCURRENT_REQUESTS:-1}
      MINERU_PDF_RENDER_TIMEOUT: ${MINERU_PDF_RENDER_TIMEOUT:-300}
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${MINERU_GPU_DEVICE_ID:-0}"]
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 120s
    restart: unless-stopped

  rag-service:
    build:
      context: .
      dockerfile: Dockerfile
      args: *build-args
      extra_hosts: *build-extra-hosts
      network: host
    image: ${TRUSTGUARD_IMAGE_PREFIX:-trustguard-}rag-service
    ports:
      - "18200:18200"
    environment:
      RAG_MYSQL_HOST: mysql
      RAG_MYSQL_PORT: "3306"
      RAG_MYSQL_USER: ${MYSQL_USER:-trustguard}
      RAG_MYSQL_PASSWORD: ${MYSQL_PASSWORD:-trustguard}
      RAG_MYSQL_DB: ${MYSQL_DATABASE:-trustguard_rag}
      RAG_QDRANT_HOST: qdrant
      RAG_QDRANT_PORT: "6333"
      RAG_REDIS_HOST: redis
      RAG_REDIS_PORT: "6379"
      RAG_RABBITMQ_HOST: rabbitmq
      RAG_RABBITMQ_PORT: "5672"
      RAG_MINIO_ENABLED: "true"
      RAG_MINIO_ENDPOINT: minio:9000
      RAG_MINIO_ACCESS_KEY: minioadmin
      RAG_MINIO_SECRET_KEY: minioadmin
      RAG_MINIO_BUCKET: trustguard-rag-artifacts
      RAG_QDRANT_MOCK: "false"
      RAG_MODE: ingest
      RAG_MINERU_BASE_URL: ${RAG_MINERU_DOCKER_BASE_URL:-http://mineru-api:8000}
      RAG_MINERU_BACKEND: ${RAG_MINERU_BACKEND:-pipeline}
      RAG_MINERU_TIMEOUT_SECONDS: ${RAG_MINERU_TIMEOUT_SECONDS:-300}
      HF_ENDPOINT: ${HF_ENDPOINT:-https://huggingface.co}
      HF_HUB_ETAG_TIMEOUT: ${HF_HUB_ETAG_TIMEOUT:-60}
      HF_HUB_DOWNLOAD_TIMEOUT: ${HF_HUB_DOWNLOAD_TIMEOUT:-300}
      HF_HUB_DISABLE_XET: ${HF_HUB_DISABLE_XET:-1}
    env_file: *optional-env-files
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - trustguard_rag_models:/models/huggingface
    depends_on:
      mineru-api:
        condition: service_healthy
      mysql:
        condition: service_healthy
      minio:
        condition: service_started
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: ${MYSQL_IMAGE:-${DOCKERHUB_REGISTRY:-docker.io}/library/mysql:8.0}
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-trustguard_rag}
      MYSQL_USER: ${MYSQL_USER:-trustguard}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-trustguard}
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    ports:
      - "18210:3306"
    volumes:
      - trustguard_rag_mysql:/var/lib/mysql
      - ./docker/mysql-init.d:/docker-entrypoint-initdb.d:ro
      - ./docker/conf.d:/etc/mysql/conf.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: ${REDIS_IMAGE:-${DOCKERHUB_REGISTRY:-docker.io}/library/redis:7-alpine}
    ports:
      - "18211:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: ${RABBITMQ_IMAGE:-${DOCKERHUB_REGISTRY:-docker.io}/library/rabbitmq:3-management-alpine}
    ports:
      - "18212:5672"
      - "18213:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10

  qdrant:
    image: ${QDRANT_IMAGE:-${DOCKERHUB_REGISTRY:-docker.io}/qdrant/qdrant:latest}
    ports:
      - "18214:6333"
      - "18215:6334"
    volumes:
      - trustguard_rag_qdrant:/qdrant/storage

  minio:
    image: ${MINIO_IMAGE:-${DOCKERHUB_REGISTRY:-docker.io}/minio/minio:latest}
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "18217:9000"
      - "18218:9001"
    volumes:
      - trustguard_rag_minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  trustguard_rag_mysql:
  trustguard_rag_qdrant:
  trustguard_rag_minio:
  trustguard_rag_models:
